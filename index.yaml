# JSW Next custom map pack catalog.
# Spec: docs/formats/MAP_REPO_CATALOG.md in the jswr repo.
# Each pack: id, map_code (mandatory unique 4-char MapCode - the client's 8.3-safe
# download/file stem, custom_maps/<map_code>.jsw), name, author, version (int,
# monotonic), description, optional min_game_version. blake2s/size cover
# packs/<id>.jsw (PC format); blake2s_next/size_next cover packs/<id>.jswn (Next
# format, what the ZX Spectrum Next downloads - PC-format rooms can't render
# on-device).
